production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  fetch_articles:
    class: FetchArticlesJob
    queue: default
    schedule: every 30 minutes

  generate_narrative_routes:
    class: GenerateNarrativeRoutesJob
    queue: default
    args: [{ limit: 50 }]
    schedule: every hour at minute 15

  regional_analysis_refresh:
    class: ScheduleRegionalAnalysisJob
    queue: default
    schedule: every 6 hours at minute 30

  cluster_narrative_signatures:
    class: NarrativeSignatureClusterJob
    queue: intelligence
    schedule: every 4 hours at minute 45

  detect_contradictions:
    class: DetectContradictionsJob
    queue: intelligence
    schedule: every 6 hours

  generate_daily_brief:
    class: GenerateIntelligenceBriefJob
    queue: intelligence
    args: ["daily"]
    schedule: every day at 6am

  capture_embedding_snapshot:
    class: CaptureEmbeddingSnapshotJob
    queue: intelligence
    schedule: every 12 hours

  fetch_gdelt_articles:
    class: FetchGdeltArticlesJob
    queue: default
    schedule: every hour

  fetch_gdelt_articles:
    class: FetchGdeltArticlesJob
    queue: default
    schedule: every hour

