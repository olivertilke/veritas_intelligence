<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERITAS Search Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap');
        
        body {
            background: #0a0c14;
            color: #e0e6ed;
            font-family: 'Inter', sans-serif;
        }
        
        .search-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .search-header {
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -1px;
        }
        
        .search-form {
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.15);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .search-form .input-group-text,
        .search-form .form-control {
            background: #0d1117;
            border-color: rgba(56, 189, 248, 0.3);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
        }
        
        .search-form .form-control::placeholder {
            color: rgba(148, 163, 184, 0.6);
        }
        
        .search-form .btn-info {
            background: #38BDF8;
            border: none;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .search-form .btn-info:hover {
            background: #0EA5E9;
        }
        
        .trending-topics {
            background: rgba(13, 17, 23, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 8px;
            padding: 16px 20px;
            margin-top: 20px;
        }
        
        .trending-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #94A3B8;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        
        .trending-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .trending-tag {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--tag-color, #38BDF8);
            color: var(--tag-color, #38BDF8);
            border-radius: 20px;
            padding: 6px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .trending-tag:hover {
            background: var(--tag-color, #38BDF8);
            color: #0A0C14;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }
        
        .topic-count {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 0.7rem;
        }
        
        .results-info {
            margin-top: 30px;
            padding: 20px;
            background: rgba(56, 189, 248, 0.03);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 8px;
        }
        
        .segment-badge {
            display: inline-block;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid #38BDF8;
            color: #38BDF8;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <!-- Header -->
        <div class="text-center mb-5">
            <h1 class="search-header text-white" style="font-weight: 700;">
                <i class="fa fa-crosshairs me-2 text-info"></i> VERITAS THREAT SEARCH
            </h1>
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #64748b;">
                [ ALGORITHM: <span class="text-white">SEMANTIC_VECTOR_PROXIMITY</span> ] // [ MODEL: <span class="text-white">TEXT-EMBEDDING-3-SMALL</span> ]
            </div>
        </div>

        <!-- Search Form -->
        <form id="searchForm" class="search-form mb-4">
            <div class="input-group input-group-lg">
                <span class="input-group-text">
                    <i class="fa fa-search"></i>
                </span>
                <input 
                    type="text" 
                    class="form-control" 
                    id="searchQuery"
                    placeholder="Search Intelligence Topics (e.g., 'Ukraine', 'Iran missiles', 'NATO deployment')..."
                    autocomplete="off"
                >
                <button class="btn btn-info" type="submit">
                    <i class="fa fa-crosshairs me-2"></i>SEARCH
                </button>
                <button class="btn btn-outline-secondary" type="button" onclick="clearSearch()" title="Clear search">
                    <i class="fa fa-times"></i>
                </button>
            </div>
        </form>

        <!-- Trending Topics -->
        <div id="trendingContainer" class="trending-topics">
            <div class="trending-label">
                <i class="fa fa-fire text-danger me-2"></i> TRENDING INTELLIGENCE TOPICS
            </div>
            <div class="trending-tags" id="trendingTags">
                <!-- Will be filled by JS -->
            </div>
        </div>

        <!-- Results / Globe Status -->
        <div id="resultsInfo" class="results-info">
            <h5 class="text-white mb-3">
                <i class="fa fa-globe me-2"></i> GLOBE STATUS
            </h5>
            <div id="globeStatus">
                <div class="text-muted">No search performed yet. Enter a query or click a trending topic.</div>
            </div>
        </div>
    </div>

    <script>
        // Mock trending topics
        const trendingTopics = [
            { keyword: 'Ukraine', count: 42, color: '#3b82f6' },
            { keyword: 'Russia', count: 38, color: '#ef4444' },
            { keyword: 'Iran', count: 35, color: '#ef4444' },
            { keyword: 'China', count: 29, color: '#f59e0b' },
            { keyword: 'NATO', count: 24, color: '#0ea5e9' },
            { keyword: 'Israel', count: 22, color: '#3b82f6' },
            { keyword: 'Taiwan', count: 18, color: '#f97316' }
        ];

        let currentSegments = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderTrendingTopics();
            setupForm();
        });

        function renderTrendingTopics() {
            const container = document.getElementById('trendingTags');
            container.innerHTML = trendingTopics.map(topic => `
                <button 
                    class="trending-tag"
                    onclick="searchFor('${topic.keyword}')"
                    style="--tag-color: ${topic.color};"
                >
                    ${topic.keyword}
                    <span class="topic-count">${topic.count}</span>
                </button>
            `).join('');
        }

        function setupForm() {
            document.getElementById('searchForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const query = document.getElementById('searchQuery').value.trim();
                if (query) searchFor(query);
            });
        }

        async function searchFor(query) {
            document.getElementById('searchQuery').value = query;
            
            // Show loading
            document.getElementById('globeStatus').innerHTML = `
                <div class="text-info">
                    <i class="fa fa-spinner fa-spin me-2"></i>
                    Searching for "${query}"...
                </div>
            `;

            try {
                // Fetch from mock API (or real Rails API when running)
                const response = await fetch(`http://localhost:3001/api/globe_data?view=segments&search_query=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                currentSegments = data.arcs || [];
                
                // Display results
                displayResults(query, data);
            } catch (err) {
                // Fallback: show mock data
                console.error('API call failed, showing mock data:', err);
                displayMockResults(query);
            }
        }

        function displayResults(query, data) {
            const segments = data.arcs || [];
            const points = data.points || [];
            
            const html = `
                <div class="mb-2">
                    <span class="text-white fw-bold">Query:</span> "<span class="text-info">${query}</span>"
                </div>
                <div class="mb-2">
                    <span class="text-white fw-bold">Segments Found:</span> <span class="text-success">${segments.length}</span>
                </div>
                <div class="mb-2">
                    <span class="text-white fw-bold">Points Found:</span> <span class="text-success">${points.length}</span>
                </div>
                ${segments.length > 0 ? `
                    <div class="mt-3">
                        <strong class="text-white">Matching Routes:</strong>
                        <div class="mt-2">
                            ${segments.map(seg => `
                                <span class="segment-badge">
                                    <i class="fa fa-arrow-right me-1"></i>
                                    ${seg.sourceName} → ${seg.targetSourceName}
                                    ${seg.framingShift ? `(${seg.framingShift})` : ''}
                                </span>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
                ${segments.length === 0 ? `
                    <div class="text-warning mt-3">
                        <i class="fa fa-info-circle me-2"></i>
                        No segments found. Try a different query or check if embeddings are generated.
                    </div>
                ` : ''}
            `;
            
            document.getElementById('globeStatus').innerHTML = html;
        }

        function displayMockResults(query) {
            // Mock response for testing without real API
            const mockSegments = [
                { sourceName: 'RT', targetSourceName: 'Sputnik', color: '#22c55e', routeName: 'Ukraine Narrative #1' },
                { sourceName: 'Sputnik', targetSourceName: 'Fox Blog', color: '#f59e0b', routeName: 'Ukraine Narrative #1' },
                { sourceName: 'CNN', targetSourceName: 'BBC', color: '#22c55e', routeName: 'Ukraine Coverage' }
            ];
            
            displayResults(query, { arcs: mockSegments, points: [{ id: 1, lat: 50.4, lng: 30.5 }] });
        }

        function clearSearch() {
            document.getElementById('searchQuery').value = '';
            currentSegments = [];
            document.getElementById('globeStatus').innerHTML = `
                <div class="text-muted">
                    Search cleared. Globe will show all articles and routes.
                </div>
            `;
        }
    </script>
</body>
</html>
